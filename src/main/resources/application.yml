spring:
  application:
    name: jackpot-service
  profiles:
    default: mock
  datasource:
    url: jdbc:h2:mem:jackpot;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

jackpot:
  kafka:
    topic: jackpot-bets

  # Jackpots seeded at startup. Covers every combination of contribution x reward type.
  seed:
    - id: classic-progressive
      initialPoolAmount: "1000.00"
      contributionType: FIXED
      contributionRate: "0.05"
      rewardType: FIXED
      rewardChance: "0.10"
    - id: must-drop
      initialPoolAmount: "1000.00"
      contributionType: FIXED
      contributionRate: "0.05"
      rewardType: VARIABLE
      rewardChance: "0.01"
      rewardPoolLimit: "5000.00"
    - id: fast-start
      initialPoolAmount: "1000.00"
      contributionType: VARIABLE
      contributionRate: "0.10"
      minContributionRate: "0.02"
      contributionDecayFactor: "0.05"
      rewardType: FIXED
      rewardChance: "0.10"
    - id: dynamic
      initialPoolAmount: "1000.00"
      contributionType: VARIABLE
      contributionRate: "0.10"
      minContributionRate: "0.02"
      contributionDecayFactor: "0.05"
      rewardType: VARIABLE
      rewardChance: "0.01"
      rewardPoolLimit: "5000.00"

---
# Real broker. Activate with --spring.profiles.active=kafka (see docker-compose.yml).
# Property names verified against the Boot 4.1 spring-boot-kafka configuration metadata.
spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # JacksonJsonSerializer, NOT the older JsonSerializer: Boot 4.1 ships Jackson 3
      # (tools.jackson) on the compile classpath, and only this serializer binds to it.
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
    consumer:
      group-id: jackpot-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # No value-deserializer here on purpose. The payload carries no type header (see below), so
      # the deserializer must be told its target type — done in KafkaConsumerConfig, where the
      # type is a compile-checked class reference rather than a string.
      #
      # earliest, not latest: a consumer group starting for the first time should process the
      # bets already sitting on the topic rather than silently skipping them.
      auto-offset-reset: earliest
    properties:
      # No type headers: the payload is a plain JSON contract, not a Java-typed message. Keeping
      # type info out means a non-Java consumer can read the topic.
      spring.json.add.type.headers: false
