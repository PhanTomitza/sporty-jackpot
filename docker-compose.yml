# Single-node Kafka in KRaft mode (no Zookeeper) for local development.
#
# Image tag apache/kafka:4.2.1 verified to pull; it matches the kafka-clients 4.2.1 that
# Spring Boot 4.1 puts on this project's classpath.
#
# The 'jackpot-bets' topic is created explicitly by the kafka-init service rather than left to
# auto-creation. Auto-creation is still enabled as a fallback, but relying on it alone meant the
# topic did not exist until the first send, so `kafka-topics.sh --list` on a fresh stack returned
# nothing and the partition count was an implicit broker default rather than a stated intent.
services:
  kafka:
    image: apache/kafka:4.2.1
    container_name: jackpot-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      # Advertised as localhost because the app runs on the host, not in this network.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # 3 partitions so the jackpotId-as-key partitioning is actually observable: bets for one
      # jackpot all land on one partition, different jackpots spread across the three.
      KAFKA_NUM_PARTITIONS: 3
      # Single node, so nothing can be replicated more than once.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      # The broker's own API-versions probe: true readiness, not a port check.
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s

  kafka-init:
    image: apache/kafka:4.2.1
    container_name: jackpot-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    # Shares the broker's network namespace, so 'localhost:9092' resolves the same way it does
    # for the broker itself. This keeps a single advertised listener; without it the broker would
    # need a second listener advertised under its service name for in-network clients.
    network_mode: "service:kafka"
    restart: on-failure
    command: >
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092
      --create --if-not-exists
      --topic jackpot-bets
      --partitions 3
      --replication-factor 1
